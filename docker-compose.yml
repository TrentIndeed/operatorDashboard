version: "3.8"

services:
  # --- Operator Dashboard Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
      - .env.vps
    volumes:
      - ./data:/app/data
      - ~/.claude:/root/.claude:ro
      - ~/.claude.json:/root/.claude.json:ro
    restart: unless-stopped

  # --- Operator Dashboard Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        - NEXT_PUBLIC_API_USER=${NEXT_PUBLIC_API_USER:-}
        - NEXT_PUBLIC_API_PASS=${NEXT_PUBLIC_API_PASS:-}
        - NEXT_PUBLIC_DISPLAY_NAME=${NEXT_PUBLIC_DISPLAY_NAME:-Operator}
        - NEXT_PUBLIC_TAGLINE=${NEXT_PUBLIC_TAGLINE:-solo founder mode}
        - NEXT_PUBLIC_INITIALS=${NEXT_PUBLIC_INITIALS:-OP}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # --- n8n Automation Engine ---
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - GENERIC_TIMEZONE=America/New_York
      - TZ=America/New_York
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - DASHBOARD_API_URL=http://backend:8000
      - EMAIL_TO
      - WHATSAPP_PHONE_ID
      - WHATSAPP_TO
      - WHATSAPP_ACCESS_TOKEN
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  n8n_data:
